name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact-name: wereread-checkin-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact-name: wereread-checkin-win-x64
          - os: macos-latest
            rid: osx-x64
            artifact-name: wereread-checkin-osx-x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0'

    - name: Get version from tag
      id: get_version
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $env:GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Publish AOT
      run: |
        dotnet publish app.cs -c Release -r ${{ matrix.rid }} --self-contained -p:DebugSymbols=false -p:StripSymbols=true -o publish/${{ matrix.artifact-name }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact-name }}
        path: publish/${{ matrix.artifact-name }}
        retention-days: 10

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        pattern: wereread-checkin-*
        merge-multiple: true

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
